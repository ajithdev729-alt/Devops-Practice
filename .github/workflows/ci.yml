name: Java CI Pipeline

on:
    push:
        branches: ["master"]

jobs:
    compile-the-code:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Source Code
              uses: actions/checkout@v3

            - name: Setup Java 17
              uses: actions/setup-java@v3
              with: 
                java-version: '17'
                distribution: 'corretto'
            - name: Build and test with Maven
              run: mvn clean test
              working-directory: ./demo-api